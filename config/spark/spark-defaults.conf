spark.master                              spark://spark-master:7077
spark.sql.catalogImplementation           hive
spark.sql.warehouse.dir                   hdfs://namenode:8020/user/hive/warehouse
spark.hadoop.fs.defaultFS                 hdfs://namenode:8020
spark.hadoop.hive.metastore.uris          thrift://hive-metastore:9083
spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version 2
spark.sql.sources.partitionOverwriteMode  dynamic
spark.streaming.stopGracefullyOnShutdown  true
spark.kafka.bootstrap.servers             kafka-broker:9092
spark.serializer                          org.apache.spark.serializer.KryoSerializer

# Kafka connector — pre-resolved at container startup to avoid HOME/ivy issues
spark.jars.packages                       org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
spark.jars.ivy                            /tmp/.ivy2

# Performance tuning
spark.sql.shuffle.partitions              4
spark.sql.adaptive.enabled                true
spark.sql.adaptive.coalescePartitions.enabled true
spark.streaming.backpressure.enabled      true
spark.streaming.kafka.maxRatePerPartition  5000
